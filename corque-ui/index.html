<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: rgba(0, 0, 0, 0); /* fully transparent */
            overflow: hidden;
            font-family: sans-serif;
        }

        #main-content {
            display: none; /* 初始状态必须是隐藏 */
            position: absolute;
            /* ... 其他定位属性 ... */
        }

        /* 只有当父元素 container 有 .show 类时才显示 */
        #container.show #main-content {
            display: flex;
        }

        #container:not(.show) #tool-btn {
            display: none !important;
        }

        #container:not(.show) #bubble-container {
            display: none !important;
        }

        #container {
            width: 100vw; height: 100vh;
            position: relative;
            background: rgba(0, 0, 0, 0); /* fully transparent */
            pointer-events: auto;
        }

        /* Click-through mode when expanded */
        #container.pass-through {
            pointer-events: none;
        }

        #container.pass-through #cactus-core,
        #container.pass-through #bubble-container,
        #container.pass-through #input-section,
        #container.pass-through #action-bar,
        #container.pass-through #tool-btn,
        #container.pass-through #tool-panel,
        #container.pass-through #email-panel,
        #container.pass-through #settings-panel,
        #container.pass-through #history-panel {
            pointer-events: auto;
        }

        /* --- 1. 图片容器定位 --- */
        #cactus-core {
            position: absolute;
            left: 0px;
            bottom: 20px;
            width: 80px;
            height: 140px;
            z-index: 100;
            background-image: url('cactus.png');  /* 你的图片路径 */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* --- 2. 输入框对齐（未展开时隐藏，仅 .show 时显示）--- */
        #input-section {
            display: none ; /* 未展开时只显示仙人掌 */
            position: absolute;
            left: 30px;    /* 避开仙人掌 */
            bottom: 20px;  /* 这里的数值要和仙人掌 body 的底部对齐 */
            padding-left: 35px;
            width: 690px;  
            display: flex;
            flex-direction: row;  /* 改回横向 */
            align-items: center;  /* 垂直居中 */
            min-height: 32px;
            height: auto;

            background: #f5f5f5; 
            gap: 8px;
            z-index: 60;

            border: 2px solid #000000;
            border-bottom: 1px solid #D3D3D3;  /* 浅灰色底边 */
            border-radius: 8px 8px 0 0;  /* 上方圆角，下方直角 */
        }

        #input-section textarea {
            flex: 1;
            min-width: 0;
            min-height: 32px;  /* textarea 最小高度 */
            max-height: 200px;  /* 限制最大高度 */
            height: auto;
            padding: 12px;
            background: transparent; border: none; outline: none;
            resize: none; font-size: 14px; line-height: 1.5;
        }

        #container:not(.show) #input-section {
            display: none !important;
        }

        /* --- 3. Action Bar 对齐（未展开时隐藏）--- */
        #action-bar {
            display: none;
            position: absolute;
            left: 20px;    /* 严格对准仙人掌 body 最左边 */
            bottom: 0px;   /* 位于仙人掌下方 */
            width: 700px; 


            height: 30px;  /* 约为仙人掌 body(60) 的一半 */
            background: #ffffe0;
            border: 2px solid #000000;
            align-items: center;
            justify-content: flex-start;
            padding: 0 8px;
            padding-right: 60px;
            z-index: 60;

    
            border-top: 2px solid #D3D3D3;  /* 顶部无边框（与输入框底边共用）*/
            border-radius: 0 0 8px 8px;  /* 下方圆角 */

            gap: 8px;
            overflow-x: auto;  /* 添加 */
        }

        .history-btn, .settings-btn {
            position: fixed;
            right: 75px;  /* 历史记录 */
            bottom: 0px;
            width: 30px;
            height: 30px;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            border: none;
        }

        .settings-btn {
            right:45px;  /* 设置按钮 */
        }

        .exit-btn {
            position: fixed;
            right: 15px;
            bottom: 0px;
            width: 30px;
            height: 30px;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            border: none;
        }


        .action-shortcut {
            flex-shrink: 0;
            padding: 3px 12px;
            background: #ffe7e7;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            min-height: 20px;
        }

        .action-shortcut:hover {
            background: #e0e0e0;
        }

        /* 状态切换：只有展开时才显示输入区和 action-bar */
        #container.show #input-section,
        #container.show #action-bar {
            display: flex;
        }

        #action-bar::-webkit-scrollbar {
            height: 4px;
        }

        /* 内部小零件 */
        #chat-select { font-size: 14px; color: #666; cursor: pointer; display: none; }
        #send-btn { 
            width: 28px; 
            height: 28px; 
            background: #29312b; color: white; 
            border: none; border-radius: 4px; cursor: pointer;
            padding: 4px 8px;
        }

        #chat-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-width: 150px;
            z-index: 200;
        }

        #chat-dropdown.show {
            display: block;
        }

        .chat-option {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
        }

        .chat-option:hover {
            background: #f5f5f5;
        }

        #tool-btn {
            display: none;
            position: absolute;
            right: 40px;
            bottom: 80px;
            width: 43px;
            height: 40px;
            background: #FFD700;
            border: 2px solid #FFD700;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            z-index: 30;
        }

        #container.show #tool-btn {
            display: block;
        }

        #tool-panel {
            display: block;  /* 保持 block */
            height: 0;       /* 用高度控制显示 */
            position: absolute;
            left: 50px;
            bottom: 60px;
            width: 670px;
            background: rgb(255, 255, 255);;
            border: none;
            border-radius: 12px 12px 0 0;
            overflow: hidden;
            transition: height 0.3s;
            z-index: 200;
        }

        #tool-panel.open {
            height: 600px;
            width: 670px;
            z-index: 200;
            border: 2px solid #a8a69e;  /* 打开时才显示边框 */
        }

        #tool-panel iframe {
            width: 670px;
            height: calc(100% - 50px);
            border: none;
        }

        #close-tool {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 40px;
            height: 40px;
            background: #FFD700;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
        }


        .bottom-controls {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            align-self: flex-end;
            padding: 4px 8px 16px 0;
        }

        #bubble-container {
            left: 20px;
            bottom: 130px;  /* 仙人掌上方 */
            position: absolute;
            width: 700px;
            height: 220px; /* 显示约 2~3 条消息 */
            max-height: 220px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px 14px;
            background: white;
            border: 2px solid #000000;
            border-radius: 10px;
            z-index: 80;
        }

        #bubble-container::-webkit-scrollbar {
            width: 4px;
        }

        .chat-message {
            max-width: 100%;
            padding: 6px 0;
            z-index: 100;
            overflow-wrap: anywhere;
            word-break: break-word;
            line-height: 1.4;
            display: block;
            height: auto;
        }

        .message-text {
            white-space: pre-wrap;
            font-family: inherit;
            tab-size: 4;
            margin: 0;
            display: block;
            max-width: 100%;
        }

        .chat-message.user {
            align-self: flex-end;
            margin-left: auto;
            color: #1a4fb8;
        }

        .chat-message.assistant {
            align-self: flex-start;
            margin-right: auto;
            color: #111111;
        }

        #container.show #bubble-container {
            display: flex;
        }


        /* bubble action/confirm removed for chat list */


        #history-panel {
            display: block;
            position: absolute;
            left: 50px;
            bottom: 0px;
            width: 670px;
            height: 0px;
            background: white;
            border: none;
            border-radius: 12px 12px 0 0;
            z-index: 300;
            overflow: hidden;
            transition: height 0.3s;
        }

        #history-panel.open {
            height: 700px;
            width: 670px;
        }

        #history-panel iframe {
            width: 670px;
            height: calc(100% - 50px);
            border: none;
        }

        #close-history {
            position: absolute;
            right: 20px;
            top: 10px;
            width: 40px;
            height: 40px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
        }
/* 
                .close-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: #f0f0f0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
        } */


        #settings-panel {
            display: block;
            position: absolute;
            left: 50px;
            bottom: 0px;
            width: 670px;
            height: 0px;
            background: white;
            border: none;
            border-radius: 12px 12px 0 0;
            z-index: 300;
            overflow: hidden;
            transition: height 0.3s;
        }

        #settings-panel.open {
            height: 700px;
            width: 670px;
        }

        #settings-panel iframe {
            width: 670px;
            height: calc(100% - 50px);
            border: none;
        }

        #email-panel {
            position: absolute;
            left: 50px;
            bottom: 0px;
            width: 670px;
            height: 0px;
            background: white;
            border: none;
            border-radius: 12px 12px 0 0;
            z-index: 300;
            overflow: hidden;
            transition: height 0.3s;
        }

        #email-panel.open {
            height: 500px;
            border: 2px solid #FFD700;
        }

        #email-panel iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 打开邮件面板时隐藏聊天区，避免遮挡和错位 */
        #container.email-open #bubble-container,
        #container.email-open #input-section,
        #container.email-open #action-bar,
        #container.email-open #tool-btn {
            display: none !important;
        }

    

    </style>

</head>
<body>
    <div id="container">
        <div id="cactus-core">
        </div>


        <div id="input-section">
            <textarea id="inp" placeholder="What do you want to ask today?..."></textarea>
            <div class="bottom-controls">
                <!-- chat select disabled -->
                <button id="send-btn">↑</button>
            </div>
            <div id="chat-dropdown">
                <div class="chat-option" onclick="selectChat('new')">New Chat</div>
            </div>
        </div>

        <button id="tool-btn">⊞</button>

        <div id="tool-panel">
            <button id="close-tool">✕</button>
            <iframe src="tools.html" frameborder="0"></iframe>
        </div>

        <div id="email-panel">
            <iframe src="email.html" frameborder="0"></iframe>
        </div>

        
        <div id="bubble-container"></div>
        <div id="history-panel">
            <button id="close-history">✕</button>
            <iframe src="history.html" frameborder="0"></iframe>
        </div>

        <div id="settings-panel">
            <iframe src="settings.html" frameborder="0"></iframe>
        </div>

        <div id="action-bar">
            <!-- history disabled -->
            <button class="settings-btn">⚙️</button>
            <button class="exit-btn">⏻</button>
        </div>
    </div>

   <script>
    const { ipcRenderer } = require('electron');
    const API_BASE = 'http://127.0.0.1:8000/api';
    let currentChatId = null;
    let currentMessages = [];
    let allowAutoScroll = true;
    let isExpandedState = false;
    let lastPassThrough = null;


    function testEmail() {
        const panel = document.getElementById('email-panel');
        if (panel) {
            panel.classList.add('open');
            console.log('Email panel opened');
        } else {
            console.error('找不到 email-panel 元素，请检查 HTML 里的 id 是否正确');
        }
    }

    function setPassThrough(enabled) {
            ipcRenderer.send('set-pass-through', enabled);
        if (enabled) {
            container.classList.add('pass-through');
        } else {
            container.classList.remove('pass-through');
        }
    }

    function setPassThroughIfNeeded(enabled) {
        if (lastPassThrough === enabled) return;
        lastPassThrough = enabled;
        setPassThrough(enabled);
    }

    async function waitForBackend(retries = 20, delayMs = 300) {
        for (let i = 0; i < retries; i++) {
            try {
                const res = await fetch(`${API_BASE}/health`);
                if (res.ok) return true;
            } catch (err) {
                // ignore and retry
            }
            await new Promise(r => setTimeout(r, delayMs));
        }
        return false;
    }

    window.addEventListener('DOMContentLoaded', async () => {
        // --- 1. 获取所有元素 ---
        const container = document.getElementById('container');
        const inputEl = document.getElementById('inp');
        const sendBtn = document.getElementById('send-btn');
        const chatSelect = document.getElementById('chat-select');
        const textarea = document.getElementById('inp');
        const interactiveSelectors = [
            '#cactus-core',
            '#bubble-container',
            '#input-section',
            '#action-bar',
            '#tool-btn',
            '#tool-panel',
            '#email-panel',
            '#settings-panel',
            '#history-panel'
        ].join(',');

        // 【调试日志】如果控制台看到报错，请看这几行打印出的是什么
        console.log('检查元素状态:', {
            container: !!container,
            inputEl: !!inputEl,
            sendBtn: !!sendBtn,
            chatSelect: !!chatSelect
        });

        // 在你的 input 监听器里
        textarea.addEventListener('input', function() {
            this.style.height = 'auto'; // 先重置，才能拿到真实的 scrollHeight
            const contentHeight = this.scrollHeight;
            this.style.height = contentHeight + 'px';

            // 重点：计算窗口需要的新高度
            // 窗口高度 = 文本高度 + 底部留白(40) + action-bar高度(30) + 顶部缓冲
            const winHeight = contentHeight + 100; 
        });

        



        const backendReady = await waitForBackend();
        if (!backendReady) {
            addMessage('assistant', 'Backend not ready. Please restart app.');
        } else {
            loadChatList();
        }

        // --- 2. 核心功能逻辑 ---

        async function handleSend() {
            const input = document.getElementById('inp');
            if (!input) return;
            
            const text = input.value.trim();
            if (!text) return;
            
            // 清空输入
            input.value = '';

            try {
                if (!(await waitForBackend(5, 200))) {
                    addMessage('assistant', 'Backend still starting. Try again.');
                    return;
                }
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, chatId: currentChatId })
                });
                const rawText = await response.text();
                let data = null;
                try {
                    data = JSON.parse(rawText);
                } catch (err) {
                    throw new Error(rawText || 'Request failed');
                }
                if (!response.ok) {
                    throw new Error(data.detail || 'Request failed');
                }
                currentChatId = data.chatId;
                addMessage('user', text);
                addMessage('assistant', data.reply || 'No response.');
                await maybeOpenEmailPanel(data.pendingAction);
                loadChatList();
            } catch (err) {
                addMessage('assistant', `Backend error: ${err.message || 'Please check the server.'}`);
                console.error(err);
            }
        }


        function toggle() {
            ipcRenderer.send('toggle');
        }

        function renderMessages(messages) {
            const container = document.getElementById('bubble-container');
            const nearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 20;
            container.innerHTML = '';
            messages.forEach((msg) => {
                const bubble = document.createElement('div');
                bubble.className = `chat-message ${msg.role}`;
                const text = document.createElement('pre');
                text.className = 'message-text';
                text.textContent = msg.content;
                bubble.appendChild(text);
                container.appendChild(bubble);
            });
            container.style.display = 'flex';
            requestAnimationFrame(() => {
                if (allowAutoScroll || nearBottom) {
                    container.scrollTop = container.scrollHeight;
                }
            });
        }

        function addMessage(role, content) {
            currentMessages.push({ role, content });
            renderMessages(currentMessages);
        }

        // // 使用示例
        // showBubble('早上好！', {
        //     action: {
        //         emoji: '👋',
        //         onClick: () => {
        //             document.getElementById('bubble-container').innerHTML = '';
        //         }
        //     }
        // });

        // showBubble('', {
        //     needConfirm: true,
        //     onConfirm: (yes) => {
        //         console.log(yes ? '点了 Yes' : '点了 No');
        //         document.getElementById('bubble-container').innerHTML = '';
        //     }
        // });


        function reloadHistoryPanel() {
            const historyFrame = document.querySelector('#history-panel iframe');
            if (historyFrame && historyFrame.contentWindow) {
                historyFrame.contentWindow.postMessage({ action: 'reloadHistory' }, '*');
            }
        }
        
        //tools------------------------------------
        const toolBtn = document.getElementById('tool-btn');
        const toolPanel = document.getElementById('tool-panel');
        const closeTool = document.getElementById('close-tool');

        if (toolBtn) {
            toolBtn.onclick = () => {
                toolPanel.classList.add('open');
                toolPanel.style.zIndex = '400';
                document.getElementById('settings-panel').style.zIndex = '300';
                document.getElementById('email-panel').style.zIndex = '300';
                toolBtn.style.display = 'none';
            };
        }

        if (closeTool) {
            closeTool.onclick = () => {
                toolPanel.classList.remove('open');
                toolBtn.style.display = 'block';
            };
        }


        window.addEventListener('message', (e) => {
            if (e.data.action === 'closeEmail') {
                document.getElementById('email-panel').classList.remove('open');
                container.classList.remove('email-open');
                setPassThroughIfNeeded(true);
            } else if (e.data.action === 'sendEmail') {
                console.log('Email sent:', e.data.data);
                document.getElementById('email-panel').classList.remove('open');
                container.classList.remove('email-open');
                setPassThroughIfNeeded(true);
            }else if (e.data.action === 'closeSettings') {
                document.getElementById('settings-panel').classList.remove('open');
                setPassThroughIfNeeded(true);
            } else if (e.data.action === 'emailResolved') {
                document.getElementById('email-panel').classList.remove('open');
                container.classList.remove('email-open');
                setPassThroughIfNeeded(true);
                if (e.data.reply) {
                    addMessage('assistant', e.data.reply);
                }
            } else if (e.data.action === 'openChat') {
                selectChat(e.data.chatId);
            } else if (e.data.action === 'updateFavorites') {
                const actionBar = document.getElementById('action-bar');
                const item = e.data.item;
                
                if (item.favorited) {
                    // 添加快捷方式
                    const btn = document.createElement('div');
                    btn.className = 'action-shortcut';
                    btn.textContent = item.name;
                    btn.dataset.id = item.id;
                    btn.onclick = () => executeTool(item.id);
                    actionBar.appendChild(btn);
                } else {
                    // 移除快捷方式
                    const btn = actionBar.querySelector(`[data-id="${item.id}"]`);
                    if (btn) btn.remove();
                }
            }
        });

        function executeTool(id) {
            console.log('Execute tool:', id);
            // 调用对应工具
        }

        // --- 3. 绑定事件 (使用安全检查) ---
        const bubbleContainer = document.getElementById('bubble-container');
        if (bubbleContainer) {
            bubbleContainer.addEventListener('scroll', () => {
                const distance = bubbleContainer.scrollHeight - bubbleContainer.scrollTop - bubbleContainer.clientHeight;
                allowAutoScroll = distance < 20;
            });
        }

        document.addEventListener('mousemove', (e) => {
            if (!isExpandedState) return;
            const el = document.elementFromPoint(e.clientX, e.clientY);
            const interactive = el && el.closest(interactiveSelectors);
            setPassThroughIfNeeded(!interactive);
        });

        // 发送按钮
        if (sendBtn) {
            sendBtn.onclick = (e) => {
                e.stopPropagation();
                handleSend();
            };
        }

        // 切换键
        if (chatSelect) {
            chatSelect.onclick = (e) => {
                e.stopPropagation();
                console.log('📂 打开历史对话列表');
            };
        }

        // 输入框回车
        if (inputEl) {
            inputEl.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    handleSend();
                }
            };
        }

        // --- 4. 窗口交互 (双击与拖拽) ---

        let isDragging = false;
        let dragCandidate = false;
        let dragStartX, dragStartY;

        container.ondblclick = (e) => {
            if (e.target.tagName !== 'TEXTAREA' && 
                !e.target.closest('#send-btn') && 
                !e.target.closest('#chat-select')) {
                isDragging = false;
                dragCandidate = false;
                toggle();
            }
        };


        container.onmousedown = (e) => {
            // 只有点在背景或仙人掌图标上才允许拖拽
            const canDrag = e.target.id === 'container' || 
                           e.target.id === 'bg-bar' || 
                           e.target.closest('#cactus-core');
                           
            if (canDrag) {
                dragCandidate = true;
                dragStartX = e.screenX;
                dragStartY = e.screenY;
                ipcRenderer.send('drag-start', { screenX: e.screenX, screenY: e.screenY });
            }
        };

        let pendingDrag = null;
        let dragRafId = null;

        function flushDrag() {
            dragRafId = null;
            if (!pendingDrag) return;
            ipcRenderer.send('drag-move', pendingDrag);
            pendingDrag = null;
        }

        document.onmousemove = (e) => {
            if (!dragCandidate && !isDragging) return;
            const deltaX = e.screenX - dragStartX;
            const deltaY = e.screenY - dragStartY;
            if (!isDragging) {
                if (Math.abs(deltaX) + Math.abs(deltaY) < 1) return;
                isDragging = true;
            }
            pendingDrag = { screenX: e.screenX, screenY: e.screenY };
            if (!dragRafId) {
                dragRafId = requestAnimationFrame(flushDrag);
            }
        };

        document.onmouseup = () => {
            isDragging = false;
            dragCandidate = false;
            ipcRenderer.send('drag-end');
            pendingDrag = null;
        };
        
        document.onmouseleave = () => {
            isDragging = false;
            dragCandidate = false;
            ipcRenderer.send('drag-end');
            pendingDrag = null;
        };

         //   ----- history---------

        if (document.querySelector('.history-btn')) {
            document.querySelector('.history-btn').onclick = null;
        }


        const chatDropdown = document.getElementById('chat-dropdown');

        if (chatSelect) {
            chatSelect.onclick = null;
        }

        document.addEventListener('click', () => {
            chatDropdown.classList.remove('show');
        });

        async function loadChatList() {
            const response = await fetch(`${API_BASE}/chats`);
            const chats = await response.json();
            
            chatDropdown.innerHTML = '<div class="chat-option" onclick="selectChat(\'new\')">New Chat</div>' +
                chats.map(chat => `<div class="chat-option" onclick="selectChat('${chat.id}')">${chat.title}</div>`).join('');
        }

        async function selectChat(id) {
            console.log('Selected chat:', id);
            chatDropdown.classList.remove('show');
            if (id === 'new') {
                currentChatId = null;
                currentMessages = [];
                renderMessages(currentMessages);
                return;
            }
            currentChatId = id;
            try {
                const response = await fetch(`${API_BASE}/chat/${id}`);
                const data = await response.json();
                currentMessages = data.messages || [];
                renderMessages(currentMessages);
                await maybeOpenEmailPanel();
            } catch (err) {
                console.error(err);
            }
        }

        window.selectChat = selectChat;

        document.querySelector('.settings-btn').onclick = () => {
            document.getElementById('settings-panel').classList.add('open');
            document.getElementById('settings-panel').style.zIndex = '400';
            document.getElementById('tool-panel').style.zIndex = '300';
            document.getElementById('email-panel').style.zIndex = '300';
            const settingsFrame = document.querySelector('#settings-panel iframe');
            if (settingsFrame && settingsFrame.contentWindow) {
                settingsFrame.contentWindow.postMessage({ action: 'reloadSettings' }, '*');
            }
        };

        document.querySelector('.exit-btn').onclick = () => {
            ipcRenderer.send('app-quit');
        };


        // 测试触发


        // --- 5. 状态接收 ---
        async function maybeOpenEmailPanel(pendingAction) {
            if (!currentChatId) return;
            let action = pendingAction;
            if (!action) {
                try {
                    const response = await fetch(`${API_BASE}/action/pending/${currentChatId}`);
                    if (!response.ok) return;
                    const text = await response.text();
                    action = text ? JSON.parse(text) : null;
                } catch (err) {
                    action = null;
                }
            }
            if (action && action.toolName === 'sendEmail') {
                const panel = document.getElementById('email-panel');
                const frame = panel.querySelector('iframe');
                const payload = { action: 'loadEmail', chatId: currentChatId, pendingAction: action };
                panel.classList.add('open');
                container.classList.add('email-open');
                panel.style.zIndex = '400';
                document.getElementById('settings-panel').style.zIndex = '300';
                document.getElementById('tool-panel').style.zIndex = '300';
                setPassThroughIfNeeded(false);
                if (frame.contentWindow) {
                    frame.contentWindow.postMessage(payload, '*');
                } else {
                    frame.onload = () => frame.contentWindow.postMessage(payload, '*');
                }
            }
        }

        ipcRenderer.on('state', (e, exp) => {
            isDragging = false;
            dragCandidate = false;
            ipcRenderer.send('drag-end');
            if (exp) {
                container.classList.add('show');
                isExpandedState = true;
                setPassThroughIfNeeded(true);
                const input = document.getElementById('inp');
                if(input) setTimeout(() => input.focus(), 150);
                setTimeout(() => {
                    if (currentMessages.length === 0) {
                        const hour = new Date().getHours();
                        const greeting = hour < 12 ? 'Good morning!' : hour < 18 ? 'Good afternoon!' : 'Good evening!';
                        addMessage('assistant', greeting);
                    }
                }, 300);
            } else {
                container.classList.remove('show');
                isExpandedState = false;
                setPassThroughIfNeeded(false);
                container.classList.remove('email-open');
                currentMessages = [];
                renderMessages(currentMessages);
                const toolPanel = document.getElementById('tool-panel');
                const toolBtn = document.getElementById('tool-btn');
                if (toolPanel) toolPanel.classList.remove('open');
                if (toolBtn) toolBtn.style.display = 'block';
            }
        });
    });
</script>
</body>
</html>
